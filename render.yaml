services:
  - type: web
    name: scholarstream
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scholarstream-db
          property: connectionString
      - key: DB_TYPE
        value: pgsql

databases:
  - name: scholarstream-db
    plan: free
    databaseName: scholarstream
    user: scholarstream_user
